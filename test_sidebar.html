<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Sidebar Toggle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }
        
        .sidebar {
            width: 260px;
            background: #1f2937;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            transition: transform 0.3s ease;
            z-index: 100;
            color: white;
            padding: 20px;
        }
        
        .main-content {
            margin-left: 260px;
            padding: 20px;
            transition: margin-left 0.3s ease;
        }
        
        .btn {
            padding: 10px 20px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.active {
                transform: translateX(0);
                box-shadow: 0 0 50px rgba(0,0,0,0.5);
            }
            
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>SIARH Menu</h2>
        <p>Este es el sidebar</p>
    </div>
    
    <div class="main-content">
        <button id="sidebar-toggle" class="btn">
            ☰ Toggle Menu
        </button>
        <h1>Prueba de Sidebar</h1>
        <p>Haz clic en el botón para mostrar/ocultar el menú</p>
        <p>Redimensiona la ventana a menos de 768px para ver el efecto responsive</p>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const sidebarToggle = document.getElementById('sidebar-toggle');
            const sidebar = document.querySelector('.sidebar');
            
            console.log('Toggle button:', sidebarToggle);
            console.log('Sidebar:', sidebar);
            
            if (sidebarToggle && sidebar) {
                sidebarToggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    sidebar.classList.toggle('active');
                    console.log('Sidebar toggled. Active:', sidebar.classList.contains('active'));
                    
                    if (sidebar.classList.contains('active')) {
                        setTimeout(() => {
                            document.addEventListener('click', closeSidebarOnClickOutside);
                        }, 100);
                    }
                });
            } else {
                console.error('No se encontró el botón o el sidebar');
            }
            
            function closeSidebarOnClickOutside(e) {
                if (!sidebar.contains(e.target) && !sidebarToggle.contains(e.target)) {
                    sidebar.classList.remove('active');
                    document.removeEventListener('click', closeSidebarOnClickOutside);
                    console.log('Sidebar cerrado por click fuera');
                }
            }
        });
    </script>
</body>
</html>
